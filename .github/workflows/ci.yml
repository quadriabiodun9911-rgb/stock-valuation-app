name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install backend runtime deps
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then python -m pip install -r backend/requirements.txt; fi
      - name: Install backend test deps
        run: |
          if [ -f backend/test-requirements.txt ]; then python -m pip install -r backend/test-requirements.txt; fi
      - name: Run backend tests
        run: |
          cd backend
          python -m pytest -q

  mobile:
    name: Mobile (web) tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          cd mobile
          npm ci --legacy-peer-deps
      - name: Run unit tests
        run: |
          cd mobile
          npm test --silent
