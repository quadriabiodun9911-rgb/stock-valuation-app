name: Alpaca Integration (manual)

on:
  workflow_dispatch: {}

jobs:
  alpaca-integration:
    runs-on: ubuntu-latest
    name: Run Alpaca integration tests (manual)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install runtime requirements
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt

      - name: Install optional Alpaca requirements
        env:
          PIP_NO_DEPS: 'false'
        run: |
          pip install -r backend/optional-requirements-alpaca.txt

      - name: Run Alpaca integration tests
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
        run: |
          pytest backend/tests -k "alpaca" -q || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alpaca-integration-logs
          path: ./
